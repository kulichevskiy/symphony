# Example symphony config. Copy this and edit the two LINEAR_TEAM_KEY /
# GITHUB_REPO entries plus the LINEAR_API_KEY env var.
# Set LINEAR_WEBHOOK_SECRET and/or GITHUB_WEBHOOK_SECRET to start the
# loopback-only webhook receiver.
#
# All paths are expanded with ~ and env vars.

poll_interval_secs: 60
global_max_concurrent: 4
workspace_root: ~/symphony/workspaces
log_root: ~/symphony/logs
db_path: ~/symphony/state.sqlite
webhook_host: 127.0.0.1
webhook_port: 8787
webhook_dedupe_ttl_secs: 600
webhook_timestamp_tolerance_secs: 60
reconcile_interval_secs: 300
reconcile_max_per_tick: 50
reconcile_max_actions_per_tick: 10
reconcile_backoff_secs: 600
ui:
  enabled: true

# Roles matrix — the per-role `{agent, model, effort}` override that
# supersedes the legacy top-level role fields (`agent`, `reviewer_agent`,
# `codex_model`, `reviewer_codex_model`, `local_review_claude_model`,
# `local_review_verifier_claude_model`). Those legacy fields still work but
# are deprecated (they warn), and setting one alongside its matrix cell is a
# hard error — pick one.
#
# Set the global default here; override per binding under each repo's own
# `roles:` block. The two deep-merge per field:
# `role = merge(global[role], binding[role])`.
#
# Roles: `implement`, `fix`, `accept` (builders, run the implementer family)
# and `review_find`, `review_verify` (the local reviewer; default to the
# opposite family for cross-family blind-spot diversity). Each cell takes:
#   agent:  claude | codex
#   model:  family-specific — Claude aliases (opus / sonnet / haiku) or a
#           Codex model id (e.g. gpt-5.1-codex). Unset → the agent's CLI
#           default (no `--model` flag).
#   effort: family-specific reasoning effort. Unset → the CLI default.
# All-unset reproduces today's behavior exactly. The example below puts the
# builder on claude and the reviewer on codex (the historical default).
roles:
  implement:
    agent: claude
  fix:
    agent: claude
  review_find:
    agent: codex
  review_verify:
    agent: codex

# Per-(linear-team, github-repo) bindings. The orchestrator scans each
# team's issues and routes implementation to the paired repo.
#
# `linear_states` is per-binding because teams rename or replace the
# source state ("Backlog" vs "Todo" vs "Up Next"). `ready` has no default
# — every binding must declare which state issues are picked up from.
repos:
  - linear_team_key: ENG
    github_repo: org/api-svc
    # Per-binding `roles:` override — deep-merges per field over the global
    # `roles:` above. Here the global default already puts the builder on
    # claude and the reviewer on codex; this binding only pins its
    # implementer to Sonnet and spends extra reasoning effort on the
    # adversarial verifier. Everything unset falls back to the global cell,
    # then to today's CLI default.
    roles:
      implement:
        model: sonnet
      review_verify:
        effort: high
    local_review: true
    remote_review: true
    issue_label: symphony
    branch_prefix: symphony
    webhook_enabled: true
    reconcile_enabled: true
    # webhook_secret: repo-specific-github-webhook-secret
    max_concurrent: 2
    runner: local
    # Optional pre-push build/test gate, run in the workspace after the
    # last code-mutating stage (post local-review fixes). Red gets one
    # implementer fix turn, then a re-run; still red blocks the push/PR
    # and parks the issue for the operator with the failure tail on
    # Linear. Omit to skip the gate. Example (masha2 in config.local.yaml):
    # verify_cmd: pnpm build && pnpm test
    # verify_timeout_secs: 900   # default: command_timeout_secs (1800)
    # Extra env injected into this binding's agent processes. Values name
    # keys in symphony's `.env` (or the daemon's process env) — the secrets
    # themselves never live in this file. A key missing at startup fails
    # `Config.load`, so typos surface at boot, not mid-run.
    # Example (masha2-style Supabase schema work via the `supabase` CLI —
    # `db push`, `gen types typescript` — instead of the OAuth-only MCP
    # server):
    # env:
    #   SUPABASE_ACCESS_TOKEN: MASHA2_SUPABASE_ACCESS_TOKEN
    #   SUPABASE_PROJECT_REF: MASHA2_SUPABASE_PROJECT_REF
    #
    # MCP servers this binding's agents may use. Agents run with
    # `--strict-mcp-config`: anything not listed here is invisible, and the
    # default is none. Entries are standard claude `--mcp-config` server
    # definitions, passed through verbatim. Only grant servers that work
    # headless (no OAuth/browser/device-code auth).
    # mcp_servers:
    #   linear:
    #     type: http
    #     url: https://mcp.linear.app/mcp
    linear_states:
      ready: Todo            # source state — orchestrator picks up issues here
      in_progress: In Progress
      local_code_review: Local Code Review
      code_review: In Review
      needs_approval: Needs Approval
      blocked: Blocked
      # waiting: Waiting   # optional dep-wait lane for Linear blockedBy pickup gates
      done: Done
  - linear_team_key: WEB
    github_repo: org/marketing-web
    # No `roles:` block → inherits the global matrix above verbatim.
    issue_label: symphony
    runner: local
    linear_states:
      ready: Backlog
      in_progress: In Progress
      local_code_review: Local Code Review
      code_review: In Review
      needs_approval: Needs Approval
      blocked: Blocked
      done: Done

# Stuck-loop escapes (mirrors today's Symphony defaults).
review_iteration_cap: 6
# Local-review uses its own cap (defaults to 3). Set lower for
# bindings where local-review should give up fast and fall back to
# the remote @codex bot; set higher for finicky codebases where
# the reviewer needs more rounds.
local_review_iteration_cap: 3

# Review notes (per-binding `local_review` / `remote_review` booleans):
#   local_review:  run the in-workspace reviewer loop before opening the PR;
#                  the issue moves through `linear_states.local_code_review`.
#   remote_review: run the `@codex` GitHub-bot review on the PR;
#                  the issue moves through `linear_states.code_review`.
# Defaults when neither is set: local_review=false, remote_review=true.
# Truth table:
#   local_review=false remote_review=true  -> remote-only (default): `@codex review`.
#   local_review=true  remote_review=false -> local-only: in-workspace reviewer
#                                             is authoritative; no remote fallback.
#   local_review=true  remote_review=true  -> sequential: local loop, PR, remote loop.
#   local_review=false remote_review=false -> no review: implement -> PR -> CI -> merge.
# The legacy `review_strategy` is deprecated. It is still accepted via shim,
# but new configs should use `local_review` / `remote_review`.
#
# Role knobs live in the `roles:` matrix (global default + per-binding
# override; see the block above `repos:`). The legacy top-level role fields
# map onto it for back-compat:
#   agent                              -> roles.{implement,fix,accept}.agent
#   codex_model                        -> roles.{implement,fix,accept}.model (codex)
#   reviewer_agent                     -> roles.{review_find,review_verify}.agent
#   reviewer_codex_model               -> roles.{review_find,review_verify}.model (codex)
#   local_review_claude_model          -> roles.review_find.model (claude)
#   local_review_verifier_claude_model -> roles.review_verify.model (claude)
# These legacy fields still work but warn; setting one alongside its matrix
# cell is a hard error. Remote review is always the `@codex` GitHub bot,
# independent of the reviewer role's agent.
