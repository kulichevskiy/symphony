[project]
name = "symphony"
version = "0.1.0"
description = "Personal autopilot driving Claude Code agents against GitHub Issues"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "structlog>=24.1",
    "jinja2>=3.1",
]

[project.scripts]
symphony = "symphony.cli:app"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["symphony"]
