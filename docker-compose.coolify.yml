# Coolify deployment of the symphony stack. Differences from the local
# docker-compose.yml:
#
#   * No host port publishing: Coolify's proxy (Traefik) owns 80/443 on the
#     server and terminates TLS for the public domain, forwarding to caddy:80
#     over the `coolify` docker network. (The local file publishes
#     127.0.0.1:443, which would EADDRINUSE against Traefik's 0.0.0.0:443.)
#   * Caddy uses Caddyfile.coolify (`:80`, `auto_https off`) instead of the
#     local `localhost { tls internal }` site.
#   * `.env` and `config.local.yaml` are declared as long-form bind mounts
#     with `content:` — Coolify's file-mount extension (it creates the files
#     and exposes the content for editing in the service's Storages UI).
#     Paste the real contents there before the first deploy. Because
#     `content:` is a Coolify extension, this file does NOT pass a plain
#     `docker compose config` — it is only deployable through Coolify.
#     Do NOT move secrets into Coolify's env-vars UI: env vars land in the
#     container's os.environ and leak into agent subprocesses past the
#     per-binding `env:` allowlist; the mounted-file path keeps secrets out
#     of the process env.
#   * SYMPHONY_REQUIRE_AUTH0=1 makes the daemon fail closed at boot if the
#     AUTH0_* triple is missing from .env — this variant is publicly routed,
#     and without the gate /api/* (including the mutating
#     /api/issues/{id}/command) would be open to the internet.
#   * caddy joins ONLY the external `coolify` network (where Coolify's proxy
#     lives). A single network means a single container IP — with two
#     networks Traefik can pick the unreachable IP and intermittently 504.
#     Turn OFF "Connect To Predefined Network" for this resource: Coolify
#     would otherwise inject its network into every service, which conflicts
#     with `network_mode: service:caddy` on the symphony service.
#
# The caddy⇄symphony topology is unchanged from the local stack: caddy owns
# the network namespace, symphony joins it, and the daemon's 127.0.0.1:8787
# surface (a security invariant) is reachable only by caddy over loopback.
#
# One-time CLI logins after the first deploy (over ssh to the server; the
# named volumes persist across redeploys) — find the real volume/image names
# with `docker volume ls` / `docker ps` (Coolify prefixes them):
#   claude: docker run --rm -it -v <claude_auth-vol>:/home/symphony/.claude \
#             --entrypoint claude <image> auth login        # paste-back code
#   gh:     docker run --rm -it -v <gh_auth-vol>:/home/symphony/.config/gh \
#             --entrypoint gh <image> auth login --git-protocol https --web
#   codex:  ssh -L 1455:localhost:1455 <server>, then on the server:
#             CODEX_AUTH_VOLUME=<codex_auth-vol> SYMPHONY_IMAGE=<image> \
#               ./scripts/codex-login-docker.sh
#           (default `codex login --device-auth` if your org allows it)

services:
  symphony:
    build: .
    restart: unless-stopped
    # Join caddy's network namespace: the daemon's 127.0.0.1:8787 http surface
    # is then reachable by caddy over loopback, without exposing it anywhere.
    network_mode: "service:caddy"
    depends_on:
      - caddy
    environment:
      # Fail closed at boot when AUTH0_* is not configured — this stack is
      # publicly routed (see header). Non-secret flag; safe in os.environ.
      SYMPHONY_REQUIRE_AUTH0: "1"
    volumes:
      # Operator config + secrets. Long-form bind mounts with `content:` —
      # Coolify's file-mount syntax (docs: knowledge-base/docker/compose#storage):
      # it creates each file with this placeholder content and exposes it for
      # editing in the service's Storages UI. Short-form `./file:/path` would
      # NOT create editable file content on a from-git deploy (both files are
      # gitignored) — Docker would mount empty dirs and the daemon dies on
      # `--config`. Paste the real contents in the UI before the first deploy.
      - type: bind
        source: ./config.local.yaml
        target: /app/config.local.yaml
        read_only: true
        content: |
          # REPLACE via Coolify Storages UI with your real config.local.yaml
          # (shape: examples/config.docker.yaml — /data paths are set there).
      - type: bind
        source: ./.env
        target: /app/.env
        read_only: true
        content: |
          # REPLACE via Coolify Storages UI with your real .env (secrets:
          # LINEAR_API_KEY, LINEAR_WEBHOOK_SECRET, AUTH0_*, TELEGRAM_*).
      # CLI auth dirs — persisted, so a one-time login survives redeploys.
      - claude_auth:/home/symphony/.claude
      - codex_auth:/home/symphony/.codex
      - gh_auth:/home/symphony/.config/gh
      # Daemon state: SQLite DB, per-issue workspaces, run logs.
      - symphony_db:/data/db
      - symphony_workspaces:/data/workspaces
      - symphony_logs:/data/logs

  caddy:
    image: caddy:2
    restart: unless-stopped
    # Reachable by Coolify's proxy on :80 over the shared docker network;
    # no host ports (Traefik owns 80/443 and terminates TLS).
    expose:
      - "80"
    # Single network = single IP (see header): only where Coolify's proxy
    # lives. Nothing else needs to reach caddy — symphony shares its netns.
    networks:
      - coolify
    volumes:
      # Long-form content mount, same mechanism as .env/config.local.yaml
      # above: Coolify writes the FILE from this content before `up`. A
      # short-form `./Caddyfile.coolify:...` bind breaks on a from-git deploy:
      # docker creates the missing source as a DIRECTORY and the container
      # dies with "not a directory" mounting it onto /etc/caddy/Caddyfile.
      # Content mirrors Caddyfile.coolify (kept for reference/local runs).
      - type: bind
        source: ./Caddyfile.coolify
        target: /etc/caddy/Caddyfile
        read_only: true
        content: |
          # Coolify's proxy (Traefik) terminates TLS for the public domain and
          # forwards here over the docker network; this caddy only bridges into
          # the shared netns where the daemon listens on loopback (127.0.0.1
          # bind is a security invariant — app.py::build_server_config).
          {
              auto_https off
          }

          :80 {
              reverse_proxy 127.0.0.1:8787
          }
      - caddy_data:/data
      - caddy_config:/config

networks:
  coolify:
    external: true

volumes:
  claude_auth:
  codex_auth:
  gh_auth:
  symphony_db:
  symphony_workspaces:
  symphony_logs:
  caddy_data:
  caddy_config:
